<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
  <title id="title">엑셀 버튼</title>
  <desc id="desc">엑셀 길게 누르기</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2fb463"/>
      <stop offset="100%" stop-color="#239451"/>
    </linearGradient>
    <linearGradient id="pedal" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.38)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.16)"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" rx="28" fill="url(#bg)"/>
  <rect x="22" y="24" width="54" height="132" rx="28" fill="url(#pedal)" stroke="rgba(255,255,255,0.22)" stroke-width="4"/>
  <rect x="42" y="38" width="14" height="104" rx="10" fill="rgba(255,255,255,0.26)"/>
  <text x="285" y="78" text-anchor="end" fill="#ffffff" font-size="42" font-weight="800" font-family="Malgun Gothic, Apple SD Gothic Neo, sans-serif">엑셀</text>
  <text x="285" y="114" text-anchor="end" fill="rgba(255,255,255,0.86)" font-size="19" font-weight="700" font-family="Malgun Gothic, Apple SD Gothic Neo, sans-serif">길게 누르기</text>
</svg>
